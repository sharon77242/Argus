version: '3.8'

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quotesdb
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./quotes-demo-app/db/init.sql:/docker-entrypoint-initdb.d/create_tables.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Quotes REST API + DiagnosticAgent ────────────────────────────────────────
  api:
    build:
      context: ./               # root context — both agent + app are sub-folders
      dockerfile: Dockerfile.demo
    image: quotes-api-with-agent
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: quotesdb
      DIAGNOSTIC_AGENT_ENABLED: "true"
      DIAGNOSTIC_DEBUG: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Traffic generator — runs once, then exits ────────────────────────────────
  simulate:
    image: quotes-api-with-agent   # reuse the already-built image
    depends_on:
      api:
        condition: service_healthy
    environment:
      TARGET_HOST: api
      TARGET_PORT: "3000"
    command: ["node", "/app/quotes-demo-app/traffic.js"]
    restart: "no"

volumes:
  db_data:
    driver: local
